# ============================================================
# RELATIONSHIP GRAPH
# Adjacency list encoding the full inter-agent relationship graph.
# Used for fast traversal without loading individual rel files.
#
# ADD AN EDGE: append whenever a relationship file is created
# under relationships/
#
# EDGE TYPES (from relationship taxonomy):
#   HD | PC | AC | CS | OG | DT | GK | BS
# ============================================================

graph_type: directed-weighted

# weight: 0.0–1.0 — how frequently these roles interact
# (1.0 = constant interaction, 0.1 = rare/situational)

edges:
